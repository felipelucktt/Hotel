services:
  postgres:
    image: postgres:14-alpine
    environment:
      POSTGRES_DB: hotel
      POSTGRES_USER: plaza
      POSTGRES_PASSWORD: 123456
    ports:
      - "5433:5432"
    networks:
      - dev-network

  pgadmin-docker:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: me@example.com
      PGADMIN_DEFAULT_PASSWORD: 1234567
    ports:
      - "5050:80"
    volumes:
      - ./.data/pgadmin:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - dev-network

  hotel-api:
    build: .
    container_name: hotel-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      - postgres
    networks:
      - dev-network

networks:
  dev-network:
    driver: bridge